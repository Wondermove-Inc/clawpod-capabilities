name: Validate capability registry

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check generated registry
        run: python3 scripts/sync_registry.py --check
      - name: Validate repository
        run: python3 scripts/validate.py
      - name: Run repository tests
        run: python3 -m unittest discover -s tests -v
      - name: Run CLI Harness unit tests
        run: python3 harnesses/clawpod-capability-registry/tests/test_core.py
      - name: Run CLI Harness end-to-end tests
        run: python3 harnesses/clawpod-capability-registry/tests/test_full_e2e.py
