name: Reject unauthorized pull requests

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  authorize-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Verify author association
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          author="$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" --jq .user.login)"
          permission="$(gh api "repos/$REPOSITORY/collaborators/$author/permission" --jq .permission 2>/dev/null || true)"

          case "$permission" in
            admin|maintain|write)
              echo "Authorized pull request author: $author ($permission)"
              ;;
            *)
              gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body "This repository accepts pull requests only from users with write, maintain, or admin permission. This pull request has been closed automatically."
              gh pr close "$PR_NUMBER" --repo "$REPOSITORY"
              echo "Unauthorized pull request author: $author (${permission:-none})" >&2
              exit 1
              ;;
          esac
