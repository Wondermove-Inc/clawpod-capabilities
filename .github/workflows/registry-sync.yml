name: Synchronize capability registry

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: registry-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  authorize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Verify authorized same-repository pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          author="$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" --jq .user.login)"
          permission="$(gh api "repos/$REPOSITORY/collaborators/$author/permission" --jq .permission 2>/dev/null || true)"
          case "$permission" in
            admin|maintain|write) ;;
            *)
              echo "Unauthorized pull request author: $author (${permission:-none})" >&2
              exit 1
              ;;
          esac

          if [ "$HEAD_REPOSITORY" != "$REPOSITORY" ]; then
            echo "Registry synchronization requires an authorized branch in this repository." >&2
            exit 1
          fi

  validate-candidate:
    needs: authorize
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out trusted generator from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: trusted
          persist-credentials: false

      - name: Check out pull request candidate without credentials
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate candidate Registry with trusted code
        run: python3 trusted/scripts/sync_registry.py --root candidate

      - name: Validate generated candidate
        working-directory: candidate
        run: |
          python3 scripts/sync_registry.py --check
          python3 scripts/validate.py
          python3 -m unittest discover -s tests -v
          python3 harnesses/clawpod-capability-registry/tests/test_core.py
          python3 harnesses/clawpod-capability-registry/tests/test_full_e2e.py

  registry-sync:
    needs: validate-candidate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Check out trusted generator from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: trusted
          persist-credentials: false

      - name: Check out pull request candidate without credentials
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false

      - name: Generate registry from package folders
        run: python3 trusted/scripts/sync_registry.py --root candidate

      - name: Commit generated registry to pull request branch
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if git -C candidate diff --quiet -- registry/index.json; then
            echo "Registry is already synchronized."
            exit 0
          fi

          git -C candidate config user.name "clawpod-registry-bot"
          git -C candidate config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C candidate add registry/index.json
          git -C candidate commit -m "chore: synchronize capability registry [skip ci]"
          generated_sha="$(git -C candidate rev-parse HEAD)"
          git -C candidate remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${HEAD_REPOSITORY}.git"
          git -C candidate push origin "HEAD:${HEAD_REF}"

          gh api --method POST "repos/$HEAD_REPOSITORY/statuses/$generated_sha" \
            -f state=success \
            -f context=validate \
            -f description="Generated Registry and candidate validation passed" \
            -f target_url="$RUN_URL"
